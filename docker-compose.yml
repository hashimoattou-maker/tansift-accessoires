version: '3.8'

services:
  app:
    build: .
    container_name: tansift-accessoires
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./backups:/app/backups
      - ./frontend:/app/frontend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=tansift-secret-change-in-production-2025
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
